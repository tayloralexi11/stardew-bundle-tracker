<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>🌿 Stardew Companion</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffd6e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Stardew">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="petals"></canvas>

  <header>
    <div class="title-row">
      <img class="mascot" src="images/junimo.gif" alt="Junimo" id="mascot">
      <h1 id="appTitle">Stardew Companion</h1>
      <button id="btnSettings" class="icon-btn" title="Settings">⚙️</button>
    </div>
    <div class="bubble" id="mascotMsg">Welcome back, farmer! 🌱</div>
  </header>

  <main>
    <!-- ============ BUNDLES ============ -->
    <section id="view-bundles" class="view-section">
      <div class="overall">
        <div class="bar"><div class="fill" id="overallFill"></div></div>
        <div class="label" id="overallLabel"></div>
      </div>
      <div class="rooms-bar" id="roomsBar"></div>

      <div class="subtabs">
        <button class="tab active" id="tabBundle">📦 Bundle</button>
        <button class="tab" id="tabSeason">🗓️ Season</button>
        <button class="tab" id="tabCart">🛒 Cart</button>
        <button class="tab" id="tabToday">☀️ Today</button>
      </div>

      <button class="drawer-toggle" data-drawer="bundleTools">🔧 Search &amp; filters <span class="chev">▾</span></button>
      <div class="drawer collapsed" id="bundleTools">
        <div class="search-wrap">
          <input id="search" type="text" placeholder="🔎 Search items…" autocomplete="off">
          <button id="searchClear" title="Clear">✕</button>
        </div>
        <div class="controls" id="mainControls">
          <div class="ctl-group">
            <span class="ctl-label">Show</span>
            <button class="chip filter active" data-filter="all">All</button>
            <button class="chip filter" data-filter="nocart">🚫 Can't Cart</button>
            <button class="chip filter" data-filter="tricky">🔥 Tricky</button>
          </div>
          <div class="ctl-group">
            <span class="ctl-label">In-season</span>
            <button class="chip season active" data-season="">Off</button>
            <button class="chip season" data-season="Spring">🌸</button>
            <button class="chip season" data-season="Summer">🌻</button>
            <button class="chip season" data-season="Fall">🍂</button>
            <button class="chip season" data-season="Winter">❄️</button>
          </div>
        </div>
      </div>

      <div id="bundleView"></div>
      <div id="seasonView" class="hidden"></div>
      <div id="cartView" class="hidden"></div>
      <div id="todayView" class="hidden"></div>
    </section>

    <!-- ============ CALENDAR ============ -->
    <section id="view-calendar" class="view-section hidden">
      <div class="season-switch" id="calSeasonSwitch"></div>
      <div class="cal-setday" id="calSetDay"></div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend">🎂 birthday · 🎉 festival · tap a birthday for gift ideas</div>
    </section>

    <!-- ============ CROPS ============ -->
    <section id="view-crops" class="view-section hidden">
      <div class="season-switch" id="cropSeasonSwitch"></div>
      <div class="crop-sortbar" id="cropSortBar"></div>
      <div class="crop-grid" id="cropGrid"></div>
    </section>

    <!-- ============ ITEMS ============ -->
    <section id="view-items" class="view-section hidden">
      <div class="vil-searchbar">
        <div class="search-wrap">
          <input id="itemSearch" type="text" placeholder="🔎 Search items…" autocomplete="off">
          <button id="itemSearchClear" title="Clear">✕</button>
        </div>
      </div>
      <div class="item-grid" id="itemGrid"></div>
      <div class="item-detail hidden" id="itemDetail"></div>
    </section>

    <!-- ============ VILLAGERS ============ -->
    <section id="view-villagers" class="view-section hidden">
      <div class="vil-searchbar">
        <div class="search-wrap">
          <input id="vilSearch" type="text" placeholder="🔎 Search villagers…" autocomplete="off">
          <button id="vilSearchClear" title="Clear">✕</button>
        </div>
      </div>
      <div class="vil-grid" id="villagerGrid"></div>
      <div class="vil-detail hidden" id="villagerDetail"></div>
    </section>
  </main>

  <!-- ============ BOTTOM NAV ============ -->
  <nav class="bottom-nav">
    <button data-section="bundles" class="navbtn active"><span class="ni">🧺</span><span>Bundles</span></button>
    <button data-section="calendar" class="navbtn"><span class="ni">📅</span><span>Calendar</span></button>
    <button data-section="crops" class="navbtn"><span class="ni">🌱</span><span>Crops</span></button>
    <button data-section="villagers" class="navbtn"><span class="ni">👥</span><span>Villagers</span></button>
    <button data-section="items" class="navbtn"><span class="ni">📦</span><span>Items</span></button>
  </nav>

  <!-- ============ SETTINGS PANEL ============ -->
  <div id="settingsBackdrop" class="backdrop hidden"></div>
  <div id="settingsPanel" class="settings-panel hidden">
    <h3>⚙️ Settings</h3>
    <div class="set-row">
      <button id="btnDark">🌙 Dark</button>
      <button id="btnSound">🔕 Sound</button>
      <button id="btnPetals">🌸 Petals</button>
    </div>
    <h4>Your progress</h4>
    <div class="set-row">
      <button id="btnExport">💾 Backup</button>
      <button id="btnImport">📂 Restore</button>
      <button id="btnReset">🧹 Reset</button>
    </div>
    <p class="set-note">Progress saves on this device. Use Backup/Restore to move it between phone &amp; computer.</p>
    <button id="settingsClose" class="settings-close">Close</button>
  </div>

  <!-- ============ NPC MODAL ============ -->
  <div id="npcBackdrop" class="backdrop hidden"></div>
  <div id="npcModal" class="npc-modal hidden"></div>

  <canvas id="confetti"></canvas>

  <script src="data.js"></script>
  <script src="data-npcs.js"></script>
  <script src="data-crops.js"></script>
  <script src="data-items.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
